apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ocp-vcf-dashboard
rules:
  # Read CRDs: Leases, Pools, Networks
  - apiGroups:
      - vspherecapacitymanager.splat.io
    resources:
      - leases
      - pools
      - networks
      - leases/status
      - pools/status
      - networks/status
    verbs:
      - get
      - list
      - watch
  # Read ConfigMaps and Secrets (for vCenter config/creds)
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - get
      - list
  # Read namespaces (for lease namespace correlation)
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
